[project]
name = "briefed-backend"
version = "1.0.0"
description = "Briefed — Personal AI email agent. FastAPI + Claude API + Gmail + Supabase."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
authors = [{ name = "Kartik Hirijaganer", email = "kartikhirijaganer@gmail.com" }]
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "anthropic>=0.40",
    "google-api-python-client>=2.149",
    "google-auth-oauthlib>=1.2",
    "supabase>=2.9",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "httpx>=0.27",
    "ruff>=0.8",
    "mypy>=1.13",
    "types-requests",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["backend"]

# --------------------------------------------------------------------------- #
# Ruff — formatter + linter. Configured to enforce Google-style docstrings,   #
# full type annotations, and import order. Runs in place of Black + isort +   #
# pydocstyle + flake8.                                                        #
# --------------------------------------------------------------------------- #
[tool.ruff]
line-length = 100
target-version = "py311"
src = ["backend"]
extend-exclude = [".venv", "dist", "build"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.ruff.lint]
select = [
    "E", "F", "W",   # pycodestyle / pyflakes
    "I",             # isort
    "N",             # pep8-naming
    "D",             # pydocstyle (docstrings)
    "ANN",           # flake8-annotations (type hints required)
    "B",             # flake8-bugbear
    "UP",            # pyupgrade
    "PL",            # pylint subset
    "SIM",           # flake8-simplify
    "RUF",           # ruff-specific
]
ignore = [
    "D203",  # conflicts with D211
    "D213",  # conflicts with D212
    "PLR0913", # allow many args in Pydantic constructors
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["D", "ANN", "PLR2004"]
"**/__init__.py" = ["D104"]

[tool.ruff.lint.flake8-annotations]
mypy-init-return = true
suppress-dummy-args = true

# --------------------------------------------------------------------------- #
# mypy — strict mode. Pydantic plugin wires in v2 model validation.           #
# --------------------------------------------------------------------------- #
[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["pydantic.mypy"]
files = ["backend"]
exclude = ["tests/"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

# --------------------------------------------------------------------------- #
# pytest                                                                      #
# --------------------------------------------------------------------------- #
[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["backend/tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers --strict-config"
