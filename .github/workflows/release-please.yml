name: Release Please

# Maintains an open release PR that bumps version + updates CHANGELOG
# whenever conventional commits land on main. Merge the release PR to
# tag `v*.*.*` — that tag is what fires deploy-prod.yml.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
