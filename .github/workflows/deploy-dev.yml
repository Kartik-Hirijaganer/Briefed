name: Deploy — dev

on:
  workflow_dispatch:
  push:
    branches: [dev]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC federation to AWS
  contents: read

jobs:
  deploy:
    name: Build image + update Lambda alias
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build + push image
        run: |
          IMAGE=${{ steps.ecr.outputs.registry }}/briefed:${GITHUB_SHA}
          docker build -f backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: terraform plan
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform apply
        working-directory: infra/terraform/envs/dev
        run: |
          terraform init
          terraform apply -auto-approve -var "image_uri=${IMAGE}"

      - name: Smoke check /health
        run: |
          URL=$(terraform -chdir=infra/terraform/envs/dev output -raw function_url)
          curl --fail --retry 5 --retry-delay 3 "${URL}health"
