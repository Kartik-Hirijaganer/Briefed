name: Deploy — dev

on:
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC federation to AWS (plan §13)
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: briefed

jobs:
  deploy:
    name: Build image + update Lambda alias
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-deploy-dev-${{ github.run_id }}
          mask-aws-account-id: true

      - name: Verify caller account
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          if [ "$ACCOUNT_ID" != "970385384114" ]; then
            echo "::error::Assumed role belongs to account $ACCOUNT_ID, expected 970385384114"
            exit 1
          fi

      - name: Ensure ECR repository exists
        # The repo must exist before ECR login + image push. Describe is
        # idempotent; create-repository runs only when describe errors.
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" \
            --region "${AWS_REGION}" > /dev/null 2>&1 \
            || aws ecr create-repository --repository-name "${ECR_REPOSITORY}" \
                 --region "${AWS_REGION}" \
                 --image-scanning-configuration scanOnPush=true \
                 --encryption-configuration encryptionType=AES256

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build + push image
        id: image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          docker build -f backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image_uri=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend (PWA bundle)
        run: npm --workspace frontend run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Generate Terraform backend config
        working-directory: infra/terraform/envs/dev
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          cat > backend.tf <<EOF
          terraform {
            backend "s3" {
              bucket         = "briefed-tf-state-dev-${ACCOUNT_ID}"
              key            = "dev/terraform.tfstate"
              region         = "us-east-1"
              dynamodb_table = "briefed-tf-lock-dev"
              encrypt        = true
            }
          }
          EOF

      - name: Run Alembic migrations against dev
        # Keep dev aligned with prod: additive migrations run before
        # Terraform publishes the new Lambda version/alias, so new code
        # never serves against an older schema.
        env:
          BRIEFED_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          BRIEFED_RUNTIME: local
        run: |
          alembic -c backend/alembic.ini upgrade head

      - name: Terraform apply (dev)
        working-directory: infra/terraform/envs/dev
        run: |
          terraform init
          terraform apply -auto-approve \
            -var "image_uri=${{ steps.image.outputs.image_uri }}"

      - name: Sync runtime secrets to SSM
        # Must run AFTER terraform apply so the parameters exist (TF
        # creates them with PLACEHOLDER; this step writes the real
        # value). The new Lambda version cold-starts at the smoke check
        # below, so it sees the fresh value. See deploy-prod.yml for
        # the full rationale.
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          SESSION_SIGNING_KEY: ${{ secrets.SESSION_SIGNING_KEY }}
        run: |
          set -euo pipefail
          put_secret() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              echo "skip: $name (no GitHub secret set)"
              return
            fi
            aws ssm put-parameter \
              --name "$name" --type SecureString \
              --value "$value" --overwrite >/dev/null
            echo "updated: $name"
          }
          put_secret /briefed/dev/openrouter_api_key          "$OPENROUTER_API_KEY"
          put_secret /briefed/dev/supabase_db_url             "$DEV_DATABASE_URL"
          put_secret /briefed/dev/google_oauth_client_id      "$GOOGLE_OAUTH_CLIENT_ID"
          put_secret /briefed/dev/google_oauth_client_secret  "$GOOGLE_OAUTH_CLIENT_SECRET"
          put_secret /briefed/dev/session_signing_key         "$SESSION_SIGNING_KEY"

      - name: Deploy PWA to S3 + invalidate CloudFront
        working-directory: infra/terraform/envs/dev
        run: |
          BUCKET=$(terraform output -raw pwa_bucket)
          aws s3 sync ../../../../frontend/dist "s3://${BUCKET}" --delete
          DIST_DOMAIN=$(terraform output -raw cloudfront_domain)
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?DomainName=='${DIST_DOMAIN}'].Id" \
            --output text)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"

      - name: Smoke check live API through CloudFront
        run: |
          DOMAIN=$(terraform -chdir=infra/terraform/envs/dev output -raw cloudfront_domain)
          # custom_error_response rewrites origin 403/404 -> /index.html (200), so `--fail`
          # alone can PASS on masked HTML. Assert the body is real OpenAPI JSON:
          curl -fsS --retry 5 --retry-delay 3 "https://${DOMAIN}/openapi.json" \
            | jq -e '.openapi and .paths' >/dev/null
          # Exercise a body-bearing write end-to-end (must carry x-amz-content-sha256 — §2/Phase 3).
          # A masked edge 403 returns text/html; the app returns application/json — assert JSON:
          ct=$(curl -s -o /dev/null -w '%{content_type}' -X POST \
            -H 'content-type: application/json' \
            -H "x-amz-content-sha256: $(printf '{}' | shasum -a 256 | cut -d' ' -f1)" \
            -d '{}' "https://${DOMAIN}/api/v1/runs")
          case "$ct" in application/json*) : ;; *) echo "POST masked/blocked at edge (got $ct)"; exit 1 ;; esac
