# Promptfoo config for the Briefed LLM prompts (plan §6 + §14 Phase 3).
#
# Run via `make eval` or:
#
#   promptfoo eval -c backend/eval/promptfoo.yaml
#
# Thresholds are enforced separately by backend/eval/thresholds.yaml; CI
# fails the job when metrics drop below the declared bar. The suite
# covers three prompts today (triage, summarize_relevant, newsletter_group).

description: "Briefed prompt eval suite"

prompts:
  - id: triage-v1
    label: "triage/v1"
    file: ../../../packages/prompts/triage/v1.md
  - id: summarize-relevant-v1
    label: "summarize_relevant/v1"
    file: ../../../packages/prompts/summarize/v1.md
  - id: newsletter-group-v1
    label: "newsletter_group/v1"
    file: ../../../packages/prompts/newsletter_group/v1.md
  - id: job-extract-v1
    label: "job_extract/v1"
    file: ../../../packages/prompts/jobs/v1.md

providers:
  - id: google:gemini-1.5-flash
    label: "Gemini 1.5 Flash"
    config:
      temperature: 0.0
      maxOutputTokens: 700
      responseMimeType: application/json

  - id: anthropic:claude-haiku-4-5
    label: "Claude Haiku 4.5 (fallback)"
    config:
      temperature: 0.0
      max_tokens: 700

tests:
  - description: "triage — canonical fixtures"
    file: golden/triage_v1.jsonl
  - description: "triage — adversarial fixtures (§19.9)"
    file: golden/triage_v1_adversarial.jsonl
  - description: "summarize_relevant — faithfulness fixtures"
    file: golden/summarize_relevant_v1.jsonl
  - description: "newsletter_group — cluster fixtures"
    file: golden/newsletter_group_v1.jsonl
  - description: "job_extract — field precision/recall + salary corroboration"
    file: golden/job_extract_v1.jsonl

defaultTest:
  assert:
    - type: is-json

outputPath: ../../.artifacts/promptfoo.json
