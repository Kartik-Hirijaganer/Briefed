# Promptfoo config for the Briefed LLM prompts (plan §6 + §14 Phase 3).
#
# Run via `make eval` or:
#
#   promptfoo eval -c backend/eval/promptfoo.yaml
#
# Thresholds are enforced separately by backend/eval/thresholds.yaml; CI
# fails the job when metrics drop below the declared bar. The suite
# covers triage, per-email summaries, newsletter groups, and category
# digest rollups.

description: "Briefed prompt eval suite"

prompts:
  - id: triage-v2
    label: "triage/v2"
    file: ../../packages/prompts/triage/v2.md
  - id: summarize-relevant-v1
    label: "summarize_relevant/v1"
    file: ../../packages/prompts/summarize/v1.md
  - id: newsletter-group-v1
    label: "newsletter_group/v1"
    file: ../../packages/prompts/newsletter_group/v1.md
  - id: category-digest-v1
    label: "category_digest/v1"
    file: ../../packages/prompts/category_digest/v1.md

providers:
  - id: openrouter:google/gemini-2.0-flash-001
    label: "Gemini Flash via OpenRouter"
    config:
      temperature: 0.0
      max_tokens: 700

  - id: openrouter:anthropic/claude-haiku-4.5
    label: "Claude Haiku 4.5 via OpenRouter"
    config:
      temperature: 0.0
      max_tokens: 700

tests:
  - file://promptfoo_cases/triage_v2.jsonl
  - file://promptfoo_cases/triage_v2_adversarial.jsonl
  - file://promptfoo_cases/summarize_relevant_v1.jsonl
  - file://promptfoo_cases/summarize_relevant_v1_adversarial.jsonl
  - file://promptfoo_cases/newsletter_group_v1.jsonl
  - file://promptfoo_cases/category_digest_v1.jsonl
  - file://promptfoo_cases/category_digest_v1_adversarial.jsonl

defaultTest:
  assert:
    - type: is-json

outputPath: ../../.artifacts/promptfoo.json
