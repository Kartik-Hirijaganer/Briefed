# Briefed — Alembic configuration (Phase 0 scaffolding).
#
# The live database URL is read from settings at runtime (env.py), not
# from this file, so prod secrets never land in the repo. This file
# holds structural config only.

[alembic]
# Migration scripts live alongside this ini so `alembic -c backend/alembic.ini`
# works from the repo root without needing absolute paths.
script_location = %(here)s/alembic

# Version path separator — keeps migration filenames URL-safe.
version_path_separator = os

# sqlalchemy.url is deliberately blank; env.py picks up the real URL from
# app.core.config.get_settings() so there is one source of truth.
sqlalchemy.url =

# Python 3.11 source_type default.
prepend_sys_path = .

# UTC timezone on new revisions for reproducibility across contributors.
timezone = UTC

[post_write_hooks]
# Run ruff format on every generated migration so they pass `make lint`.
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
