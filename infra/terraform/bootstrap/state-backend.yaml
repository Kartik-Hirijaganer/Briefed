AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Briefed — Terraform state backend bootstrap. Creates the S3 bucket
  (versioned, AES-256, public access blocked) and DynamoDB lock table
  used by terraform's S3 backend. Run once per environment; Terraform
  takes over from there.

Parameters:
  Env:
    Type: String
    AllowedValues: [dev, prod]
    Description: Environment slug — used in bucket and table names.

Resources:
  StateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "briefed-tf-state-${Env}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: briefed:env
          Value: !Ref Env
        - Key: briefed:managed
          Value: cloudformation

  LockTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "briefed-tf-lock-${Env}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: LockID
          AttributeType: S
      KeySchema:
        - AttributeName: LockID
          KeyType: HASH
      Tags:
        - Key: briefed:env
          Value: !Ref Env
        - Key: briefed:managed
          Value: cloudformation

Outputs:
  StateBucketName:
    Value: !Ref StateBucket
  LockTableName:
    Value: !Ref LockTable
